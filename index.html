<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guest Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 28px 16px;
      background: #081225;
      color: #f8fafc;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    h1 {
      text-align: center;
      margin: 0 0 22px;
      font-size: 2.1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
    }

    .field-group.full {
      grid-column: 1 / -1;
    }

    label {
      margin-bottom: 6px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #020617;
      color: #f8fafc;
      font-size: 15px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.15);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .scan-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .scan-btn {
      background: #2563eb;
      color: white;
    }

    .reset-btn {
      background: #475569;
      color: white;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      font-size: 14px;
      color: #93c5fd;
    }

    .status.error {
      color: #fca5a5;
    }

    .status.success {
      color: #86efac;
    }

    .bottom-section {
      display: grid;
      grid-template-columns: 1fr 190px;
      gap: 16px;
      margin-top: 28px;
      align-items: start;
    }

    .entries-card,
    .export-card {
      border: 1px solid #334155;
      border-radius: 12px;
      background: #0b1220;
      padding: 14px;
    }

    .entries-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .entries-header h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .entry-count {
      font-size: 13px;
      color: #93c5fd;
    }

    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 230px;
      overflow-y: auto;
    }

    .entry-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #111827;
      font-size: 14px;
    }

    .entry-name {
      font-weight: 700;
      color: #f8fafc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-time {
      color: #93c5fd;
      white-space: nowrap;
      font-size: 13px;
    }

    .export-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;
      justify-content: flex-start;
    }

    .export-card h3 {
      margin: 0;
      font-size: 1rem;
    }

    .export-card p {
      margin: 0;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.4;
    }

    .export-btn {
      background: #f59e0b;
      color: #1f2937;
      width: 100%;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 800px) {
      .form-grid,
      .bottom-section,
      .scan-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Guest Login</h1>

    <div class="form-grid">
      <div class="field-group full">
        <label for="scanInput">Scan ID</label>
        <input id="scanInput" type="text" placeholder="Click here and scan ID..." autofocus />
      </div>

      <div class="field-group full">
        <label for="rawScan">Raw Scan Data</label>
        <textarea id="rawScan" readonly placeholder="Leave this visible for testing. Tomorrow, scan with the work scanner and screenshot this box."></textarea>
      </div>

      <div class="field-group">
        <label for="name">Name</label>
        <input id="name" type="text" />
      </div>

      <div class="field-group">
        <label for="dob">DOB</label>
        <input id="dob" type="text" />
      </div>

      <div class="field-group">
        <label for="exp">Date of Expiration</label>
        <input id="exp" type="text" />
      </div>

      <div class="field-group">
        <label for="dl">DL Number</label>
        <input id="dl" type="text" />
      </div>

      <div class="field-group full">
        <label for="datetime">Date & Time</label>
        <input id="datetime" type="text" readonly />
      </div>
    </div>

    <div class="scan-row">
      <button class="scan-btn" id="scanBtn" type="button">Scan ID</button>
      <button class="reset-btn" id="resetBtn" type="button">Reset Form</button>
    </div>

    <div id="statusMsg" class="status">Ready.</div>

    <div class="bottom-section">
      <div class="entries-card">
        <div class="entries-header">
          <h2>Today’s Entries</h2>
          <div id="entryCount" class="entry-count">0 entries</div>
        </div>
        <div id="entryList" class="entry-list"></div>
      </div>

      <div class="export-card">
        <h3>Exports</h3>
        <p>Export the current day's entries to CSV.</p>
        <button class="export-btn" id="exportBtn" type="button">Export CSV</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://tlzbtqiedaispfrmcmgr.supabase.co";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_PUBLISHABLE_KEY_HERE";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const scanInput = document.getElementById("scanInput");
    const rawScan = document.getElementById("rawScan");
    const nameInput = document.getElementById("name");
    const dobInput = document.getElementById("dob");
    const expInput = document.getElementById("exp");
    const dlInput = document.getElementById("dl");
    const datetimeInput = document.getElementById("datetime");
    const statusMsg = document.getElementById("statusMsg");
    const entryList = document.getElementById("entryList");
    const entryCount = document.getElementById("entryCount");

    const scanBtn = document.getElementById("scanBtn");
    const resetBtn = document.getElementById("resetBtn");
    const exportBtn = document.getElementById("exportBtn");

    let todayEntries = [];

    function setStatus(message, type = "") {
      statusMsg.textContent = message;
      statusMsg.className = `status ${type}`.trim();
    }

    function focusScan() {
      scanInput.focus();
    }

    function nowDisplayString(date = new Date()) {
      return date.toLocaleString();
    }

    function getTodayBounds() {
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
      return {
        start: start.toISOString(),
        end: end.toISOString()
      };
    }

    function escapeCSV(value) {
      const stringValue = String(value ?? "");
      return `"${stringValue.replace(/"/g, '""')}"`;
    }

    function downloadCSV(filename, rows) {
      if (!rows.length) {
        setStatus("No entries to export.", "error");
        return;
      }

      const headers = ["Name", "DOB", "Expiration", "DL Number", "Date & Time"];
      const csvLines = [
        headers.join(","),
        ...rows.map(row =>
          [
            escapeCSV(row.visitor_name),
            escapeCSV(row.dob),
            escapeCSV(row.expiration_date),
            escapeCSV(row.dl_number),
            escapeCSV(new Date(row.logged_at).toLocaleString())
          ].join(",")
        )
      ];

      const blob = new Blob([csvLines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      setStatus("CSV exported.", "success");
    }

    function renderEntries(entries) {
      entryList.innerHTML = "";

      if (!entries.length) {
        entryList.innerHTML = `<div class="entry-item"><span class="entry-name">No scans yet today</span><span class="entry-time">--:--</span></div>`;
      } else {
        entries.forEach(entry => {
          const item = document.createElement("div");
          item.className = "entry-item";

          const displayName = entry.visitor_name?.trim() || "Unknown";
          const displayTime = new Date(entry.logged_at).toLocaleTimeString([], {
            hour: "numeric",
            minute: "2-digit"
          });

          item.innerHTML = `
            <span class="entry-name">${displayName}</span>
            <span class="entry-time">${displayTime}</span>
          `;

          entryList.appendChild(item);
        });
      }

      entryCount.textContent = `${entries.length} ${entries.length === 1 ? "entry" : "entries"}`;
    }

    function clearForm() {
      scanInput.value = "";
      rawScan.value = "";
      nameInput.value = "";
      dobInput.value = "";
      expInput.value = "";
      dlInput.value = "";
      datetimeInput.value = "";
      focusScan();
    }

    function parseLicenseData(text) {
      const result = {
        name: "",
        dob: "",
        exp: "",
        dl: ""
      };

      const cleanedText = text.trim();

      const dlMatch = cleanedText.match(/\d{6,}/);
      if (dlMatch) {
        result.dl = dlMatch[0];
      }

      const words = cleanedText.split(/\s+/).filter(Boolean);

      if (words.length >= 2) {
        result.name = words[1];
      }

      const dateMatches = cleanedText.match(/\b\d{1,2}[/-]\d{1,2}[/-]\d{2,4}\b/g);
      if (dateMatches && dateMatches.length >= 1) {
        result.dob = dateMatches[0] || "";
      }
      if (dateMatches && dateMatches.length >= 2) {
        result.exp = dateMatches[1] || "";
      }

      return result;
    }

    async function loadTodayEntries() {
      const { start, end } = getTodayBounds();

      const { data, error } = await supabaseClient
        .from("guest_log_entries")
        .select("*")
        .gte("logged_at", start)
        .lt("logged_at", end)
        .order("logged_at", { ascending: false });

      if (error) {
        setStatus(`Error loading entries: ${error.message}`, "error");
        return;
      }

      todayEntries = data || [];
      renderEntries(todayEntries);
    }

    async function saveEntry() {
      const visitor_name = nameInput.value.trim();
      const dob = dobInput.value.trim();
      const expiration_date = expInput.value.trim();
      const dl_number = dlInput.value.trim();
      const raw_scan = rawScan.value.trim();

      if (!visitor_name && !dl_number && !raw_scan) {
        setStatus("No scan detected.", "error");
        clearForm();
        return;
      }

      const payload = {
        visitor_name,
        dob,
        expiration_date,
        dl_number,
        raw_scan
      };

      const { error } = await supabaseClient
        .from("guest_log_entries")
        .insert(payload);

      if (error) {
        setStatus(`Save failed: ${error.message}`, "error");
        return;
      }

      setStatus("Scan saved.", "success");
      clearForm();
    }

    async function processScan() {
      const text = scanInput.value.trim();
      if (!text) return;

      rawScan.value = text;

      const parsed = parseLicenseData(text);

      nameInput.value = parsed.name || "";
      dobInput.value = parsed.dob || "";
      expInput.value = parsed.exp || "";
      dlInput.value = parsed.dl || "";
      datetimeInput.value = nowDisplayString();

      scanInput.value = "";

      await saveEntry();
    }

    function setupRealtime() {
      supabaseClient
        .channel("guest-log-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "guest_log_entries" },
          async () => {
            await loadTodayEntries();
          }
        )
        .subscribe();
    }

    scanBtn.addEventListener("click", focusScan);
    resetBtn.addEventListener("click", clearForm);

    exportBtn.addEventListener("click", () => {
      const today = new Date();
      const filename = `guest-log-${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}.csv`;
      downloadCSV(filename, [...todayEntries].reverse());
    });

    scanInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        processScan();
      }
    });

    scanInput.addEventListener("change", processScan);

    (async function init() {
      focusScan();
      setStatus("Loading today's entries...");
      await loadTodayEntries();
      setupRealtime();
      setStatus("Ready.");
    })();
  </script>
</body>
</html>
