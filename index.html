<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guest Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 28px 16px;
      background: #081225;
      color: #f8fafc;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    h1 {
      text-align: center;
      margin: 0 0 22px;
      font-size: 2.1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
    }

    .field-group.full {
      grid-column: 1 / -1;
    }

    label {
      margin-bottom: 6px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #020617;
      color: #f8fafc;
      font-size: 15px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.15);
    }

    textarea {
      min-height: 68px;
      resize: vertical;
    }

    .attached-notes-wrap {
      margin-top: 8px;
      display: none;
    }

    .attached-notes-btn {
      background: none;
      border: none;
      color: #93c5fd;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      font-weight: 700;
      text-align: left;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    button, .logs-link {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    .scan-btn {
      background: #2563eb;
      color: white;
    }

    .save-btn {
      background: #22c55e;
      color: #052e16;
    }

    .clear-btn {
      background: #475569;
      color: white;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      font-size: 14px;
      color: #93c5fd;
    }

    .status.error {
      color: #fca5a5;
    }

    .status.success {
      color: #86efac;
    }

    .bottom-section {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 16px;
      margin-top: 28px;
      align-items: start;
    }

    .entries-card,
    .export-card {
      border: 1px solid #334155;
      border-radius: 12px;
      background: #0b1220;
      padding: 14px;
    }

    .entries-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .entries-header h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .entry-count {
      font-size: 13px;
      color: #93c5fd;
    }

    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 230px;
      overflow-y: auto;
    }

    .entry-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #111827;
      font-size: 14px;
    }

    .entry-name {
      font-weight: 700;
      color: #f8fafc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-time {
      color: #93c5fd;
      white-space: nowrap;
      font-size: 13px;
    }

    .export-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .export-card h3 {
      margin: 0;
      font-size: 1rem;
    }

    .export-card p {
      margin: 0;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.4;
    }

    .export-btn {
      background: #f59e0b;
      color: #1f2937;
      width: 100%;
    }

    .logs-link {
      background: #1e293b;
      color: #f8fafc;
      width: 100%;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }

    .modal-card {
      width: min(500px, 100%);
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 20px;
      color: #f8fafc;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .modal-card h3 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .modal-note-date {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .modal-note-text {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      min-height: 80px;
      white-space: pre-wrap;
    }

    .modal-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .modal-close-btn {
      background: #475569;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 800px) {
      .form-grid,
      .bottom-section,
      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Guest Login</h1>

    <div class="form-grid">
      <div class="field-group full">
        <label for="scanInput">Scan ID</label>
        <input id="scanInput" type="text" placeholder="Click here and scan ID..." autofocus />
      </div>

      <div class="field-group full">
        <label for="notes">Notes</label>
        <textarea id="notes" placeholder="Optional notes..."></textarea>
        <div id="attachedNotesWrap" class="attached-notes-wrap">
          <button id="attachedNotesBtn" class="attached-notes-btn" type="button">*See attached notes*</button>
        </div>
      </div>

      <div class="field-group">
        <label for="name">Name</label>
        <input id="name" type="text" />
      </div>

      <div class="field-group">
        <label for="dob">DOB</label>
        <input id="dob" type="text" />
      </div>

      <div class="field-group">
        <label for="exp">Date of Expiration</label>
        <input id="exp" type="text" />
      </div>

      <div class="field-group">
        <label for="dl">DL Number</label>
        <input id="dl" type="text" />
      </div>

      <div class="field-group full">
        <label for="datetime">Date & Time</label>
        <input id="datetime" type="text" readonly />
      </div>
    </div>

    <div class="button-row">
      <button class="scan-btn" id="scanBtn" type="button">Scan ID</button>
      <button class="save-btn" id="saveBtn" type="button">Save</button>
      <button class="clear-btn" id="clearBtn" type="button">Clear</button>
    </div>

    <div id="statusMsg" class="status">Ready.</div>

    <div class="bottom-section">
      <div class="entries-card">
        <div class="entries-header">
          <h2>Today’s Entries</h2>
          <div id="entryCount" class="entry-count">0 entries</div>
        </div>
        <div id="entryList" class="entry-list"></div>
      </div>

      <div class="export-card">
        <h3>Logs</h3>
        <p>Download today's CSV or browse older saved logs.</p>
        <button class="export-btn" id="exportBtn" type="button">Download Today CSV</button>
        <a class="logs-link" href="logs.html">View Logs</a>
      </div>
    </div>
  </div>

  <div id="notesModal" class="modal-overlay">
    <div class="modal-card">
      <h3>Previous Guest Note</h3>
      <div id="modalNoteDate" class="modal-note-date"></div>
      <div id="modalNoteText" class="modal-note-text"></div>
      <div class="modal-actions">
        <button id="closeNotesModal" class="modal-close-btn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://tlzbtqiedaispfrmcmgr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_VYsQmiQmFTZuErotHoLBQA_2qpfKjLX";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const scanInput = document.getElementById("scanInput");
    const notesInput = document.getElementById("notes");
    const nameInput = document.getElementById("name");
    const dobInput = document.getElementById("dob");
    const expInput = document.getElementById("exp");
    const dlInput = document.getElementById("dl");
    const datetimeInput = document.getElementById("datetime");
    const statusMsg = document.getElementById("statusMsg");
    const entryList = document.getElementById("entryList");
    const entryCount = document.getElementById("entryCount");

    const scanBtn = document.getElementById("scanBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const exportBtn = document.getElementById("exportBtn");

    const attachedNotesWrap = document.getElementById("attachedNotesWrap");
    const attachedNotesBtn = document.getElementById("attachedNotesBtn");
    const notesModal = document.getElementById("notesModal");
    const modalNoteText = document.getElementById("modalNoteText");
    const modalNoteDate = document.getElementById("modalNoteDate");
    const closeNotesModal = document.getElementById("closeNotesModal");

    let todayEntries = [];
    let scanTimer = null;
    let previousGuestNote = "";
    let previousGuestNoteDate = "";

    function setStatus(message, type = "") {
      statusMsg.textContent = message;
      statusMsg.className = `status ${type}`.trim();
    }

    function focusScan() {
      scanInput.focus();
    }

    function nowDisplayString(date = new Date()) {
      return date.toLocaleString();
    }

    function getTodayBounds() {
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
      return {
        start: start.toISOString(),
        end: end.toISOString()
      };
    }

    function escapeCSV(value) {
      const stringValue = String(value ?? "");
      return `"${stringValue.replace(/"/g, '""')}"`;
    }

    function downloadCSV(filename, rows) {
      if (!rows.length) {
        setStatus("No entries to export.", "error");
        return;
      }

      const headers = ["Name", "DOB", "Expiration", "DL Number", "Date & Time", "Notes"];
      const csvLines = [
        headers.join(","),
        ...rows.map(row =>
          [
            escapeCSV(row.visitor_name),
            escapeCSV(row.dob),
            escapeCSV(row.expiration_date),
            escapeCSV(row.dl_number),
            escapeCSV(new Date(row.logged_at).toLocaleString()),
            escapeCSV(row.notes)
          ].join(",")
        )
      ];

      const blob = new Blob([csvLines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      setStatus("CSV exported.", "success");
    }

    function renderEntries(entries) {
      entryList.innerHTML = "";

      if (!entries.length) {
        entryList.innerHTML = `<div class="entry-item"><span class="entry-name">No scans yet today</span><span class="entry-time">--:--</span></div>`;
      } else {
        entries.forEach(entry => {
          const item = document.createElement("div");
          item.className = "entry-item";

          const displayName = entry.visitor_name?.trim() || "Unknown";
          const displayTime = new Date(entry.logged_at).toLocaleTimeString([], {
            hour: "numeric",
            minute: "2-digit"
          });

          item.innerHTML = `
            <span class="entry-name">${displayName}</span>
            <span class="entry-time">${displayTime}</span>
          `;

          entryList.appendChild(item);
        });
      }

      entryCount.textContent = `${entries.length} ${entries.length === 1 ? "entry" : "entries"}`;
    }

    function clearForm() {
      scanInput.value = "";
      notesInput.value = "";
      nameInput.value = "";
      dobInput.value = "";
      expInput.value = "";
      dlInput.value = "";
      datetimeInput.value = "";

      previousGuestNote = "";
      previousGuestNoteDate = "";
      attachedNotesWrap.style.display = "none";
      modalNoteText.textContent = "";
      modalNoteDate.textContent = "";

      setStatus("Form cleared.");
      focusScan();
    }

    function extractField(text, code) {
      const regex = new RegExp(code + "([^\\n\\r]*)");
      const match = text.match(regex);
      if (!match) return "";

      let value = match[1];

      value = value.split(/DAA|DAB|DAC|DAD|DAE|DAF|DAG|DAH|DAI|DAJ|DAK|DAL|DAM|DAN|DAO|DAP|DAQ|DAR|DAS|DAT|DAU|DAV|DAW|DAX|DAY|DAZ|DBA|DBB|DBC|DBD|DBE|DBF|DBG|DBH|DBI|DBJ|DBK|DBL|DBM|DBN|DBO|DBP|DBQ|DCS|DDE|DDF|DDG/)[0];

      return value.trim();
    }

    function formatAAMVADate(value) {
      if (!value) return "";
      const cleaned = value.replace(/\D/g, "");
      if (cleaned.length === 8) {
        return `${cleaned.slice(0, 2)}/${cleaned.slice(2, 4)}/${cleaned.slice(4)}`;
      }
      return value;
    }

    function cleanNamePart(value) {
      if (!value) return "";
      return value.replace(/-/g, "").replace(/~/g, "").trim();
    }

    function parseLicenseData(text) {
      const result = {
        name: "",
        dob: "",
        exp: "",
        dl: ""
      };

      const first = cleanNamePart(extractField(text, "DAC"));
      const middle = cleanNamePart(extractField(text, "DAD"));
      const last = cleanNamePart(extractField(text, "DCS"));
      const dl = extractField(text, "DAQ");
      const dob = extractField(text, "DBB");
      const exp = extractField(text, "DBA");

      result.name = [first, middle, last].filter(Boolean).join(" ").trim();
      result.dl = dl;
      result.dob = formatAAMVADate(dob);
      result.exp = formatAAMVADate(exp);

      return result;
    }

    async function loadPreviousGuestNote(dlNumber) {
      previousGuestNote = "";
      previousGuestNoteDate = "";
      attachedNotesWrap.style.display = "none";

      if (!dlNumber) return;

      const { data, error } = await supabaseClient
        .from("guest_log_entries")
        .select("notes, logged_at")
        .eq("dl_number", dlNumber)
        .not("notes", "is", null)
        .neq("notes", "")
        .order("logged_at", { ascending: false })
        .limit(1);

      if (error) {
        console.error("Previous note lookup failed:", error.message);
        return;
      }

      if (data && data.length > 0) {
        previousGuestNote = data[0].notes || "";
        previousGuestNoteDate = data[0].logged_at || "";
        attachedNotesWrap.style.display = "block";
      }
    }

    async function loadTodayEntries() {
      const { start, end } = getTodayBounds();

      const { data, error } = await supabaseClient
        .from("guest_log_entries")
        .select("*")
        .gte("logged_at", start)
        .lt("logged_at", end)
        .order("logged_at", { ascending: false });

      if (error) {
        setStatus(`Error loading entries: ${error.message}`, "error");
        return;
      }

      todayEntries = data || [];
      renderEntries(todayEntries);
    }

    async function saveEntry() {
      const visitor_name = nameInput.value.trim();
      const dob = dobInput.value.trim();
      const expiration_date = expInput.value.trim();
      const dl_number = dlInput.value.trim();
      const notes = notesInput.value.trim();

      if (!visitor_name && !dl_number) {
        setStatus("No scan detected.", "error");
        return;
      }

      const payload = {
        visitor_name,
        dob,
        expiration_date,
        dl_number,
        notes
      };

      const { error } = await supabaseClient
        .from("guest_log_entries")
        .insert(payload);

      if (error) {
        setStatus(`Save failed: ${error.message}`, "error");
        return;
      }

      setStatus("Saved successfully.", "success");
      clearForm();
      await loadTodayEntries();
    }

    async function processScan(textValue) {
      const text = textValue.trim();
      if (!text) return;

      const parsed = parseLicenseData(text);

      nameInput.value = parsed.name || "";
      dobInput.value = parsed.dob || "";
      expInput.value = parsed.exp || "";
      dlInput.value = parsed.dl || "";
      datetimeInput.value = nowDisplayString();

      scanInput.value = "";

      await loadPreviousGuestNote(parsed.dl);

      setStatus("Scan captured. Review fields, then click Save.");
    }

    function setupRealtime() {
      supabaseClient
        .channel("guest-log-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "guest_log_entries" },
          async () => {
            await loadTodayEntries();
          }
        )
        .subscribe();
    }

    scanBtn.addEventListener("click", focusScan);
    saveBtn.addEventListener("click", saveEntry);
    clearBtn.addEventListener("click", clearForm);

    exportBtn.addEventListener("click", () => {
      const today = new Date();
      const filename = `guest-log-${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}.csv`;
      downloadCSV(filename, [...todayEntries].reverse());
    });

    scanInput.addEventListener("input", () => {
      clearTimeout(scanTimer);

      scanTimer = setTimeout(() => {
        const value = scanInput.value;
        if (value.trim()) {
          processScan(value);
        }
      }, 120);
    });

    attachedNotesBtn.addEventListener("click", () => {
      modalNoteText.textContent = previousGuestNote || "No note found.";
      modalNoteDate.textContent = previousGuestNoteDate
        ? `Previous note from ${new Date(previousGuestNoteDate).toLocaleString()}`
        : "";
      notesModal.style.display = "flex";
    });

    closeNotesModal.addEventListener("click", () => {
      notesModal.style.display = "none";
    });

    notesModal.addEventListener("click", (event) => {
      if (event.target === notesModal) {
        notesModal.style.display = "none";
      }
    });

    (async function init() {
      focusScan();
      setStatus("Loading today's entries...");
      await loadTodayEntries();
      setupRealtime();
      setStatus("Ready.");
    })();
  </script>
</body>
</html>
